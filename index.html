<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Equipe Madeira | Planilha de Controle</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --wood-primary: #5d4037;
            --wood-dark: #3e2723;
            --wood-light: #8d6e63;
            --wood-accent: #d7ccc8;
        }
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #f4f1ee; 
            color: #3e2723;
            -webkit-tap-highlight-color: transparent;
            overflow-x: hidden;
            width: 100%;
        }
        .font-mono { font-family: 'JetBrains Mono', monospace; }
        .table-row-hover:hover { background-color: #fdfbf9; }
        input, select { border: none !important; outline: none !important; box-shadow: none !important; -webkit-appearance: none; appearance: none; }
        
        /* Previne zoom no iOS ao focar campos */
        input[type="text"], input[type="number"], input[type="date"], select {
            font-size: 16px !important; 
        }

        /* Efeito Premium 3D Relevo (Neumorphic/Embossed) */
        .relief-card {
            background: #f4f1ee;
            border-radius: 2rem;
            box-shadow: 8px 8px 16px #e0ddd9, -8px -8px 16px #ffffff;
            border: 1px solid rgba(255,255,255,0.5);
        }
        .relief-stat {
            background: #f4f1ee;
            box-shadow: inset 4px 4px 8px #e0ddd9, inset -4px -4px 8px #ffffff;
        }
        .relief-button {
            background: var(--wood-primary);
            box-shadow: 4px 4px 10px rgba(0,0,0,0.2), inset 1px 1px 1px rgba(255,255,255,0.2);
            transition: all 0.2s;
        }
        .relief-button:active {
            box-shadow: 1px 1px 2px rgba(0,0,0,0.3);
            transform: translateY(1px);
        }
        
        .wood-text-3d {
            color: var(--wood-dark);
            text-shadow: 1px 1px 0px #ffffff, 2px 2px 4px rgba(0,0,0,0.1);
        }

        /* Cascade Animation */
        @keyframes cascadeIn {
            0% { opacity: 0; transform: translateY(20px); }
            100% { opacity: 1; transform: translateY(0); }
        }
        .animate-cascade {
            animation: cascadeIn 0.5s ease forwards;
            animation-delay: var(--delay);
            opacity: 0;
        }
        #history-section.revealed {
            display: block !important;
            opacity: 1;
            transform: translateY(0);
        }
    </style>
</head>
<body class="min-h-screen">

    <!-- Auth Overlay -->
    <div id="auth-overlay" class="fixed inset-0 z-[100] bg-[#f4f1ee] flex items-center justify-center p-6 transition-all duration-500">
        <div class="relief-card p-10 max-w-sm w-full space-y-8 flex flex-col items-center">
            <div class="text-center">
                <i data-lucide="shield-lock" class="w-12 h-12 text-[#5d4037] mx-auto mb-4"></i>
                <h2 class="text-2xl font-black wood-text-3d tracking-tighter">ACESSO RESTRITO</h2>
                <p class="text-stone-400 text-[10px] font-black uppercase tracking-[0.3em] mt-2">Identifique-se Integrante</p>
            </div>
            
            <div class="w-full space-y-4">
                <div class="relief-stat p-1 rounded-2xl">
                    <input type="password" id="access-password" placeholder="Sua Senha" class="w-full bg-transparent px-6 py-4 text-center font-mono font-bold text-stone-800 placeholder:text-stone-300">
                </div>
                <button onclick="checkAccess()" class="relief-button w-full text-white py-4 rounded-2xl font-black text-sm tracking-[0.2em] uppercase active:scale-95 transition-all">
                    Entrar na Madeira
                </button>
                <p id="auth-error" class="text-rose-500 text-[9px] font-black uppercase text-center tracking-widest hidden">Senha incorreta para a equipe.</p>
            </div>
        </div>
    </div>

    <!-- Main Content (Hidden by default) -->
    <div id="main-app" class="hidden max-w-6xl mx-auto px-4 py-6 md:py-10 space-y-6 md:space-y-10 relative">
        
        <!-- Botões Superiores (Canto Superior Direito) -->
        <div class="md:absolute top-10 right-4 flex flex-col md:flex-row gap-3 z-50">
            <button onclick="toggleHistory()" class="relief-button text-white px-6 py-3 rounded-xl text-[10px] font-black uppercase tracking-[0.2em] flex items-center justify-center gap-2 hover:scale-105 active:scale-95 transition-all w-full md:w-auto">
                <i data-lucide="history" class="w-4 h-4"></i>
                Histórico
            </button>
        </div>

        <!-- Header & Stats Summary -->
        <header class="flex flex-col lg:flex-row justify-between items-start lg:items-center gap-6 md:gap-8">
            <div>
                <h1 class="text-2xl md:text-3xl font-black tracking-tighter wood-text-3d flex items-center gap-2">
                    <i data-lucide="shield-half" class="text-[#5d4037]"></i>
                    EQUIPE <span class="text-[#5d4037] px-2 py-1 bg-white/40 rounded-lg shadow-inner">MADEIRA</span>
                </h1>
                <p class="text-stone-400 text-[10px] font-bold uppercase tracking-[0.3em] mt-2 mb-4 md:mb-0" id="current-date-display"></p>
            </div>

            <div class="w-full lg:max-w-2xl space-y-4 md:space-y-6">
                <!-- Card Principal de Saldo -->
                <div class="relief-card px-6 py-6 md:px-10 md:py-8 flex flex-col items-center justify-center text-center">
                    <p id="stat-balance-label" class="text-[9px] md:text-[10px] font-black text-stone-400 uppercase tracking-[0.3em] mb-1 md:mb-2 text-center">Monitor de Caixa</p>
                    <p id="stat-balance" class="text-3xl md:text-5xl font-black font-mono text-stone-900 tracking-tighter">R$ 0,00</p>
                </div>

                <!-- Modais/Cards Menores de Categorias -->
                <div class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-6 gap-2 md:gap-3">
                    <div class="relief-stat p-2.5 md:p-3 rounded-xl md:rounded-2xl">
                        <p class="text-[8px] md:text-[9px] font-black text-emerald-600 uppercase tracking-widest mb-1">Saques</p>
                        <p id="total-SAQUE" class="text-xs md:text-sm font-bold font-mono text-stone-700">R$ 0</p>
                    </div>
                    <div class="relief-stat p-2.5 md:p-3 rounded-xl md:rounded-2xl">
                        <p class="text-[8px] md:text-[9px] font-black text-stone-400 uppercase tracking-widest mb-1">Depósitos</p>
                        <p id="total-Deposito" class="text-xs md:text-sm font-bold font-mono text-stone-700">R$ 0</p>
                    </div>
                    <div class="relief-stat p-2.5 md:p-3 rounded-xl md:rounded-2xl">
                        <p class="text-[8px] md:text-[9px] font-black text-stone-400 uppercase tracking-widest mb-1">Proxy</p>
                        <p id="total-proxy" class="text-xs md:text-sm font-bold font-mono text-stone-700">R$ 0</p>
                    </div>
                    <div class="relief-stat p-2.5 md:p-3 rounded-xl md:rounded-2xl">
                        <p class="text-[8px] md:text-[9px] font-black text-stone-400 uppercase tracking-widest mb-1">Bot 12hs</p>
                        <p id="total-bot12hs" class="text-xs md:text-sm font-bold font-mono text-stone-700">R$ 0</p>
                    </div>
                    <div class="relief-stat p-2.5 md:p-3 rounded-xl md:rounded-2xl">
                        <p class="text-[8px] md:text-[9px] font-black text-stone-400 uppercase tracking-widest mb-1">Recarga 4G</p>
                        <p id="total-recarga4g" class="text-xs md:text-sm font-bold font-mono text-stone-700">R$ 0</p>
                    </div>
                    <div class="relief-stat p-2.5 md:p-3 rounded-xl md:rounded-2xl">
                        <p class="text-[8px] md:text-[9px] font-black text-stone-400 uppercase tracking-widest mb-1">Outros</p>
                        <p id="total-Outros" class="text-xs md:text-sm font-bold font-mono text-stone-700">R$ 0</p>
                    </div>
                </div>
            </div>
        </header>

        <!-- Planilha Principal -->
        <div class="space-y-6">
            <div class="relief-card overflow-hidden">
                
                <!-- Linha de Entrada (Quick Add) -->
                <form id="transaction-form" class="bg-[#3e2723] p-4 md:p-5 flex flex-col lg:flex-row items-stretch lg:items-center gap-3 md:gap-4 shadow-xl">
                    <div class="flex-1 space-y-2">
                        <select id="cat-input" class="w-full bg-[#2d1d1a] text-stone-200 px-4 py-3 rounded-xl text-sm font-bold cursor-pointer hover:bg-[#4e342e] transition-colors">
                            <option value="Deposito">Deposito</option>
                            <option value="proxy">Proxy</option>
                            <option value="bot12hs">Bot 12hs</option>
                            <option value="recarga4g">Recarga 4G</option>
                            <option value="SAQUE">SAQUE</option>
                            <option value="Outros">Outros</option>
                        </select>
                        <!-- Seletor de Tipo (Oculto por padrão, aparece se 'Outros' for selecionado) -->
                        <div id="type-selector-wrapper" class="hidden">
                            <select id="type-input" class="w-full bg-[#8d6e63] text-white px-3 py-2 rounded-lg text-[10px] font-black uppercase tracking-wider cursor-pointer font-mono">
                                <option value="expense">TIPO: DESPESA</option>
                                <option value="income">TIPO: RECEITA</option>
                            </select>
                        </div>
                    </div>
                    <div class="flex-[1.5]">
                        <input type="text" id="desc-input" placeholder="Comentário do Lançamento" class="w-full bg-[#2d1d1a] text-stone-200 px-4 py-3 rounded-xl text-sm placeholder:text-stone-600 font-medium">
                    </div>
                    <div class="flex flex-row gap-3">
                        <div class="flex-1">
                            <input type="number" id="amount-input" step="0.01" required placeholder="Valor R$" class="w-full bg-[#2d1d1a] text-stone-200 px-4 py-3 rounded-xl text-sm font-black placeholder:text-stone-600 [appearance:textfield] [&::-webkit-outer-spin-button]:appearance-none [&::-webkit-inner-spin-button]:appearance-none">
                        </div>
                        <div class="flex-1">
                            <input type="date" id="date-input" required class="w-full bg-[#2d1d1a] text-stone-200 px-4 py-3 rounded-xl text-sm font-bold filter invert opacity-80">
                        </div>
                    </div>
                    <button type="submit" class="relief-button text-white px-8 py-3 rounded-xl font-black text-sm transition-all flex items-center justify-center gap-2 active:scale-95 shrink-0">
                        <i data-lucide="check-square" class="w-4 h-4"></i>
                        REGISTRAR
                    </button>
                </form>

                <!-- Tabela de Histórico -->
                <div id="history-section" class="hidden opacity-0 transform translate-y-8 transition-all duration-700 ease-out">
                    <div class="overflow-x-auto border-t border-stone-200">
                        <table class="w-full text-left border-collapse">
                            <thead class="bg-stone-50 border-b border-stone-200">
                                <tr>
                                    <th class="px-8 py-5 text-[10px] font-black text-stone-400 uppercase tracking-[0.2em]">Data</th>
                                    <th class="px-8 py-5 text-[10px] font-black text-stone-400 uppercase tracking-[0.2em]">Atividade</th>
                                    <th class="px-8 py-5 text-[10px] font-black text-stone-400 uppercase tracking-[0.2em]">Nota</th>
                                    <th class="px-8 py-5 text-[10px] font-black text-stone-400 uppercase tracking-[0.2em] text-right">Montante</th>
                                    <th class="px-8 py-5 text-[10px] font-black text-stone-400 uppercase tracking-[0.2em] text-center">Gestão</th>
                                </tr>
                            </thead>
                            <tbody id="table-body" class="divide-y divide-stone-100">
                                <!-- Conteúdo gerado por JS -->
                            </tbody>
                        </table>
                    </div>
                    
                    <!-- Mobile View (List) - Rendered via JS -->
                    <div id="mobile-history-list" class="md:hidden divide-y divide-stone-100"></div>
                </div>
            </div>
            
            <div class="text-center text-stone-400 text-[10px] font-black uppercase tracking-[0.4em] pt-4">
                EQUIPE MADEIRA • SISTEMA DE GESTÃO INTERNA
            </div>
        </div>
    </div>

    <script>
        // --- Estado ---
        let transactions = [];
        let currentBinId = null;
        let isDataInitialized = false; // Safety flag
        const MASTER_KEY = '$2a$10$D4Sd5VXrNrc1TAmEIfEgh.TnEc9wr2VJzzJvpMpTaQdQIx3wAFwS.';

        const USER_CONFIGS = {
            'Froid12': '69f530e036566621a8154e94',
            'Pedro23': '69f5314e856a68218997261c',
            'Bruno34': '69f5319536566621a81550cf',
            'Cauã45': '69f531dbaaba8821975f22ef',
            'Danilo56': '69f53211aaba8821975f23af'
        };

        const CATEGORY_COLORS = {
            'Deposito': '#a1887f',
            'proxy': '#8d6e63',
            'bot12hs': '#795548',
            'recarga4g': '#6d4c41',
            'SAQUE': '#34d399',
            'Outros': '#546e7a'
        };

        // --- API Integration ---
        async function syncToCloud() {
            if (!currentBinId || !isDataInitialized) return; // Only sync if we haven't failed loading
            showLoading(true);
            try {
                await fetch(`https://api.jsonbin.io/v3/b/${currentBinId}`, {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-Master-Key': MASTER_KEY
                    },
                    body: JSON.stringify(transactions)
                });
            } catch (err) {
                console.error("Erro ao salvar dados (Sync abortado):", err);
            } finally {
                showLoading(false);
            }
        }

        async function loadFromCloud() {
            if (!currentBinId) return;
            showLoading(true);
            try {
                const res = await fetch(`https://api.jsonbin.io/v3/b/${currentBinId}/latest`, {
                    headers: { 'X-Master-Key': MASTER_KEY }
                });
                const data = await res.json();
                
                // Safety: Only overwrite if we received a valid array record
                if (data && Array.isArray(data.record)) {
                    transactions = data.record;
                    isDataInitialized = true; // Mark as safe to sync
                    render();
                } else {
                    throw new Error("Formato de dados inválido na nuvem");
                }
            } catch (err) {
                console.error("Erro ao carregar dados:", err);
                alert("ERRO DE CARREGAMENTO: Os dados não foram baixados corretamente. Salve uma nova linha para tentar novamente ou verifique sua conexão.");
            } finally {
                showLoading(false);
            }
        }

        function showLoading(isLoading) {
            const btn = document.querySelector('#transaction-form button');
            if (isLoading) {
                btn.innerHTML = '<i data-lucide="refresh-cw" class="w-4 h-4 animate-spin"></i> SINCRONIZANDO...';
                btn.classList.add('opacity-70');
            } else {
                btn.innerHTML = '<i data-lucide="check-square" class="w-4 h-4"></i> REGISTRAR';
                btn.classList.remove('opacity-70');
                if (window.lucide) lucide.createIcons();
            }
        }

        // --- Core ---
        function render() {
            updateStats();
            renderTable();
            if (window.lucide) lucide.createIcons();
        }

        function updateStats() {
            const income = transactions.filter(t => t.type === 'income').reduce((acc, t) => acc + t.amount, 0);
            const expenses = transactions.filter(t => t.type === 'expense').reduce((acc, t) => acc + t.amount, 0);
            const balance = income - expenses;

            const format = (v) => v.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
            
            const balanceEl = document.getElementById('stat-balance');
            const labelEl = document.getElementById('stat-balance-label');

            balanceEl.textContent = format(balance);
            
            if (balance >= 0) {
                labelEl.textContent = 'Forrou';
                labelEl.className = 'text-[10px] font-black text-emerald-500 uppercase tracking-[0.3em] mb-2';
                balanceEl.className = 'text-5xl font-black font-mono text-emerald-600 tracking-tighter';
            } else {
                labelEl.textContent = 'Fumo de';
                labelEl.className = 'text-[10px] font-black text-rose-500 uppercase tracking-[0.3em] mb-2';
                balanceEl.className = 'text-5xl font-black font-mono text-rose-600 tracking-tighter';
            }

            // Totais por Categoria
            const categories = ['Deposito', 'proxy', 'bot12hs', 'recarga4g', 'SAQUE', 'Outros'];
            categories.forEach(cat => {
                const total = transactions
                    .filter(t => t.category === cat)
                    .reduce((acc, t) => acc + t.amount, 0);
                const el = document.getElementById(`total-${cat}`);
                if (el) el.textContent = format(total).replace('R$', '').trim();
            });
        }

        function renderTable() {
            const tbody = document.getElementById('table-body');
            const mobileList = document.getElementById('mobile-history-list');
            const historySection = document.getElementById('history-section');
            
            tbody.innerHTML = '';
            mobileList.innerHTML = '';

            const sorted = [...transactions].sort((a, b) => new Date(b.date) - new Date(a.date));

            if (sorted.length === 0) {
                const emptyMsg = `<div class="px-8 py-16 text-center text-stone-300 text-[10px] font-black uppercase tracking-widest">Aguardando dados...</div>`;
                tbody.innerHTML = `<tr><td colspan="5">${emptyMsg}</td></tr>`;
                mobileList.innerHTML = emptyMsg;
                return;
            }

            sorted.forEach((t, index) => {
                const isIncome = t.type === 'income';
                const delay = `${index * 30}ms`;
                
                // Desktop Row
                const row = document.createElement('tr');
                row.style.setProperty('--delay', delay);
                row.className = 'table-row-hover group transition-colors animate-cascade hidden md:table-row';
                row.innerHTML = `
                    <td class="px-8 py-4 text-[10px] font-mono font-bold text-stone-400 whitespace-nowrap">
                        ${new Date(t.date + 'T12:00:00').toLocaleDateString('pt-BR')}
                    </td>
                    <td class="px-8 py-4">
                        <span class="inline-flex items-center gap-1 px-2 py-1 rounded-md text-[8px] font-black uppercase tracking-widest" style="color: ${CATEGORY_COLORS[t.category]}; background: ${CATEGORY_COLORS[t.category]}12">
                            ${t.category}
                        </span>
                    </td>
                    <td class="px-8 py-4 text-xs font-medium text-stone-500 italic max-w-xs truncate">
                        ${t.description || '---'}
                    </td>
                    <td class="px-8 py-4 text-right">
                        <span class="font-mono font-black text-sm ${isIncome ? 'text-emerald-500' : 'text-stone-800'}">
                            ${isIncome ? '+' : '-'} ${t.amount.toLocaleString('pt-BR', { minimumFractionDigits: 2 })}
                        </span>
                    </td>
                    <td class="px-8 py-4 text-center">
                        <button onclick="deleteRow('${t.id}')" class="p-1.5 text-stone-200 hover:text-rose-500 transition-all opacity-0 group-hover:opacity-100">
                            <i data-lucide="x" class="w-3.5 h-3.5"></i>
                        </button>
                    </td>
                `;
                tbody.appendChild(row);

                // Mobile Card (Dense)
                const card = document.createElement('div');
                card.style.setProperty('--delay', delay);
                card.className = 'p-3 flex items-center justify-between group animate-cascade bg-white/30 mb-1 rounded-xl mx-2';
                card.innerHTML = `
                    <div class="flex flex-col gap-0.5 min-w-0">
                        <div class="flex items-center gap-2">
                            <span class="text-[8px] font-mono font-bold text-stone-400">${new Date(t.date + 'T12:00:00').toLocaleDateString('pt-BR', {day:'2-digit', month:'2-digit'})}</span>
                            <span class="text-[8px] font-black uppercase tracking-tighter" style="color: ${CATEGORY_COLORS[t.category]}">${t.category}</span>
                        </div>
                        <p class="text-[10px] font-bold text-stone-600 truncate italic">${t.description || 'Sem nota'}</p>
                    </div>
                    <div class="flex items-center gap-3 shrink-0">
                        <span class="font-mono font-black text-xs ${isIncome ? 'text-emerald-500' : 'text-stone-800'}">
                            ${isIncome ? '+' : '-'} ${t.amount.toLocaleString('pt-BR')}
                        </span>
                        <button onclick="deleteRow('${t.id}')" class="p-2 text-stone-300">
                            <i data-lucide="x" class="w-3.5 h-3.5"></i>
                        </button>
                    </div>
                `;
                mobileList.appendChild(card);
            });
            if (window.lucide) lucide.createIcons();
        }

        // --- Handlers ---
        window.toggleHistory = () => {
            const section = document.getElementById('history-section');
            if (section.classList.contains('hidden')) {
                section.classList.remove('hidden');
                // Trigger animation after layout
                requestAnimationFrame(() => {
                    section.classList.add('revealed');
                    renderTable(); // Re-render to trigger cascade
                });
            } else {
                section.classList.remove('revealed');
                setTimeout(() => section.classList.add('hidden'), 500);
            }
        };
        const catInput = document.getElementById('cat-input');
        const typeWrapper = document.getElementById('type-selector-wrapper');

        catInput.onchange = () => {
            if (catInput.value === 'Outros') {
                typeWrapper.classList.remove('hidden');
            } else {
                typeWrapper.classList.add('hidden');
            }
        };

        window.deleteRow = async (id) => {
            if(confirm('Remover esta linha da planilha?')) {
                transactions = transactions.filter(t => t.id !== id);
                render();
                await syncToCloud();
            }
        };

        document.getElementById('transaction-form').onsubmit = async (e) => {
            e.preventDefault();
            const category = catInput.value;
            const desc = document.getElementById('desc-input').value;
            const amount = parseFloat(document.getElementById('amount-input').value);
            const date = document.getElementById('date-input').value;
            const customType = document.getElementById('type-input').value;

            if(!amount || !date) return;

            let finalType;
            if (category === 'Outros') {
                finalType = customType;
            } else {
                finalType = category === 'SAQUE' ? 'income' : 'expense';
            }

            transactions.push({
                id: Date.now().toString(),
                category,
                description: desc,
                amount,
                date,
                type: finalType
            });

            e.target.reset();
            typeWrapper.classList.add('hidden');
            document.getElementById('date-input').valueAsDate = new Date();
            render();
            await syncToCloud();
        };

        // --- Auth ---
        function checkAccess() {
            const pass = document.getElementById('access-password').value;
            const errorEl = document.getElementById('auth-error');
            const binId = USER_CONFIGS[pass];
            
            if (binId) {
                currentBinId = binId;
                sessionStorage.setItem('madeira_auth_pass', pass);
                errorEl.classList.add('hidden');
                showApp();
                loadFromCloud();
            } else {
                errorEl.classList.remove('hidden');
                document.getElementById('access-password').value = '';
            }
        }

        function showApp() {
            document.getElementById('auth-overlay').classList.add('opacity-0', 'pointer-events-none');
            setTimeout(() => {
                document.getElementById('auth-overlay').style.display = 'none';
                document.getElementById('main-app').classList.remove('hidden');
            }, 500);
        }

        // --- Init ---
        window.onload = () => {
            const savedPass = sessionStorage.getItem('madeira_auth_pass');
            if (savedPass && USER_CONFIGS[savedPass]) {
                currentBinId = USER_CONFIGS[savedPass];
                showApp();
                loadFromCloud();
            }
            const now = new Date();
            document.getElementById('current-date-display').textContent = new Intl.DateTimeFormat('pt-BR', { dateStyle: 'full' }).format(now);
            document.getElementById('date-input').valueAsDate = now;
        };
    </script>
</body>
</html>
